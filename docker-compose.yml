version: '3.8'

services:
  whatsapp-bot:
    build: .
    container_name: whatsapp_bot
    hostname: whatsapp-bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - whatsapp_data:/app
    environment:
      - NODE_ENV=production
    # Nécessaire pour Chromium/Puppeteer
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined

volumes:
  whatsapp_data:
