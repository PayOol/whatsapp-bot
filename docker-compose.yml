version: '3.8'

services:
  whatsapp-bot:
    build: .
    container_name: whatsapp_bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./.wwebjs_auth:/app/.wwebjs_auth
      - ./.wwebjs_cache:/app/.wwebjs_cache
      - ./warnings.json:/app/warnings.json
      - ./blocked_users.json:/app/blocked_users.json
      - ./logs.json:/app/logs.json
      - ./groups.json:/app/groups.json
      - ./call_spam.json:/app/call_spam.json
      - ./config.json:/app/config.json
    environment:
      - NODE_ENV=production
    # Nécessaire pour Chromium/Puppeteer
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
