<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — PayOol™ Bot</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%2325D366'/%3E%3Cpath d='M16 6c-5.5 0-10 4.5-10 10 0 1.8.5 3.5 1.3 5L6 26l5.2-1.3c1.4.7 3 1.1 4.7 1.1 5.5 0 10-4.5 10-10S21.5 6 16 6zm4.7 13.5c-.3.5-1.1.8-1.8.8-.5 0-1.1-.1-1.9-.5-2.2-1-3.5-3.2-3.6-3.4-.1-.2-.8-1.1-.8-2.1s.5-1.5.7-1.7c.2-.2.4-.3.6-.3h.5c.2 0 .4 0 .5.4.2.5.7 1.7.7 1.8.1.1.1.3 0 .4-.1.2-.1.3-.2.4l-.3.4c-.1.1-.2.3-.1.5.1.2.5.8 1.1 1.4.8.7 1.4 1 1.6 1.1.2.1.4.1.5-.1.1-.2.5-.6.7-.8.2-.2.3-.2.5-.1l1.6.8c.2.1.4.2.5.3.1.2.1.9-.2 1.4z' fill='white'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--primary:#00D26A;--primary-rgb:0,210,106;--bg:#06080C;--bg-card:#131A24;--bg-elevated:#1C2536;--text:#F0F4F8;--text-secondary:#8B99AE;--border:rgba(255,255,255,0.08);--danger:#FF4757}
        [data-theme="light"]{--bg:#F8FAFC;--bg-card:#FFFFFF;--bg-elevated:#F1F5F9;--text:#0F172A;--text-secondary:#475569;--border:rgba(0,0,0,0.08)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .header{position:fixed;top:0;left:0;right:0;height:60px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
        .logo{display:flex;align-items:center;gap:10px;font-weight:700}
        .logo i{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),#7C3AED);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#000;font-size:16px}
        .header-actions{display:flex;gap:10px}
        .btn{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
        .btn-ghost{background:transparent;color:var(--text-secondary)}
        .btn-ghost:hover{color:var(--text)}
        .btn-danger{background:rgba(255,71,87,0.1);color:var(--danger)}
        .main{padding:80px 20px 40px;max-width:1000px;margin:0 auto}
        .welcome{margin-bottom:24px}
        .welcome h1{font-size:24px;margin-bottom:4px}
        .welcome p{color:var(--text-secondary)}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
        .stat{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px}
        .stat-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
        .stat-icon.green{background:rgba(0,210,106,0.15);color:var(--primary)}
        .stat-icon.blue{background:rgba(59,130,246,0.15);color:#3B82F6}
        .stat-icon.orange{background:rgba(255,190,11,0.15);color:#FFBE0B}
        .stat-value{font-size:24px;font-weight:700}
        .stat-label{font-size:12px;color:var(--text-secondary)}
        .section{margin-bottom:24px}
        .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .section-title{font-size:18px;font-weight:600}
        .btn-primary{background:linear-gradient(135deg,var(--primary),#00B85C);color:#000}
        .sessions{display:flex;flex-direction:column;gap:10px}
        .session{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:space-between}
        .session-info{display:flex;align-items:center;gap:12px}
        .status{width:10px;height:10px;border-radius:50%}
        .status.connected{background:var(--primary)}
        .status.disconnected{background:var(--danger)}
        .status.pending{background:#FFBE0B;animation:pulse 1.5s infinite}
        @keyframes pulse{50%{opacity:0.5}}
        .session-name{font-weight:500}
        .session-phone{font-size:12px;color:var(--text-secondary)}
        .session-actions{display:flex;gap:6px}
        .btn-sm{padding:6px 12px;font-size:12px}
        .empty{text-align:center;padding:40px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px}
        .empty i{font-size:40px;color:var(--text-secondary);margin-bottom:12px}
        .empty h3{margin-bottom:8px}
        .empty p{color:var(--text-secondary);margin-bottom:16px;font-size:14px}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200}
        .modal-overlay.active{display:flex}
        .modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:360px;width:90%}
        .modal h3{margin-bottom:16px}
        .form-group{margin-bottom:12px}
        .form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px}
        .form-input{width:100%;padding:10px 12px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none}
        .form-input:focus{border-color:var(--primary)}
        .toast{position:fixed;top:70px;right:20px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:8px;font-size:14px;z-index:300;animation:slideIn 0.3s}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        .toast.success{border-color:rgba(0,210,106,0.3)}
        .toast.error{border-color:rgba(255,71,87,0.3)}
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><i class="fas fa-shield-alt"></i><span>PayOol™ Bot</span></div>
        <div class="header-actions">
            <button class="btn btn-ghost" id="theme-toggle"><i class="fas fa-moon"></i></button>
            <button class="btn btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
        </div>
    </header>
    <main class="main">
        <div class="welcome">
            <h1>Bienvenue, <span id="username">Utilisateur</span></h1>
            <p>Gérez vos sessions WhatsApp</p>
        </div>
        <div class="stats">
            <div class="stat"><div class="stat-icon green"><i class="fas fa-mobile-alt"></i></div><div class="stat-value" id="stat-sessions">0</div><div class="stat-label">Sessions</div></div>
            <div class="stat"><div class="stat-icon blue"><i class="fas fa-trash-alt"></i></div><div class="stat-value" id="stat-deleted">0</div><div class="stat-label">Liens supprimés</div></div>
            <div class="stat"><div class="stat-icon orange"><i class="fas fa-exclamation-triangle"></i></div><div class="stat-value" id="stat-warnings">0</div><div class="stat-label">Avertissements</div></div>
        </div>
        <section class="section">
            <div class="section-header">
                <h2 class="section-title">Mes Sessions</h2>
                <button class="btn btn-primary" onclick="showModal()"><i class="fas fa-plus"></i> Nouvelle</button>
            </div>
            <div class="sessions" id="sessions"></div>
        </section>
    </main>
    <div class="modal-overlay" id="modal" onclick="if(event.target===this)hideModal()">
        <div class="modal">
            <h3>Nouvelle Session</h3>
            <div class="form-group">
                <label class="form-label">Nom</label>
                <input type="text" class="form-input" id="session-name" placeholder="Ma session">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="createSession()">Créer</button>
        </div>
    </div>
    <script>
        const html=document.documentElement;
        const theme=localStorage.getItem('theme')||'light';
        html.setAttribute('data-theme',theme);
        document.getElementById('theme-toggle').innerHTML=theme==='dark'?'<i class="fas fa-moon"></i>':'<i class="fas fa-sun"></i>';
        document.getElementById('theme-toggle').onclick=()=>{const n=html.getAttribute('data-theme')==='dark'?'light':'dark';html.setAttribute('data-theme',n);localStorage.setItem('theme',n);location.reload()};
        
        let user=null;
        async function checkAuth(){try{const r=await fetch('/api/auth/verify');const d=await r.json();if(!d.success&&!d.valid){location.replace('/auth');return false}user=d.user?d.user.username:d.username;document.getElementById('username').textContent=user;return true}catch{location.replace('/auth');return false}}
        async function loadSessions(){try{const r=await fetch('/api/sessions');const d=await r.json();const s=d.sessions||[];document.getElementById('stat-sessions').textContent=s.length;const el=document.getElementById('sessions');if(!s.length){el.innerHTML='<div class="empty"><i class="fas fa-mobile-alt"></i><h3>Aucune session</h3><p>Créez votre première session WhatsApp</p><button class="btn btn-primary" onclick="showModal()">Créer une session</button></div>';return}el.innerHTML=s.map(x=>`<div class="session"><div class="session-info"><div class="status ${x.status}"></div><div><div class="session-name">${x.name||'Session'}</div><div class="session-phone">${x.phone||'Non connecté'}</div></div></div><div class="session-actions">${x.status==='disconnected'||x.status==='stopped'?`<button class="btn btn-primary btn-sm" onclick="start('${x.id}')"><i class="fas fa-play"></i></button>`:`<button class="btn btn-ghost btn-sm" onclick="stop('${x.id}')"><i class="fas fa-stop"></i></button>`}<button class="btn btn-danger btn-sm" onclick="del('${x.id}')"><i class="fas fa-trash"></i></button></div></div>`).join('')}catch{}}
        async function loadStats(){try{const r=await fetch('/api/stats');const d=await r.json();document.getElementById('stat-deleted').textContent=d.totalDeleted||0;document.getElementById('stat-warnings').textContent=d.totalWarnings||0}catch{}}
        function showModal(){document.getElementById('modal').classList.add('active')}
        function hideModal(){document.getElementById('modal').classList.remove('active')}
        function toast(m,t='success'){const e=document.createElement('div');e.className='toast '+t;e.innerHTML='<i class="fas fa-'+(t==='success'?'check':'exclamation')+'-circle"></i> '+m;document.body.appendChild(e);setTimeout(()=>e.remove(),3000)}
        async function createSession(){const n=document.getElementById('session-name').value.trim();if(!n){toast('Nom requis','error');return}try{const r=await fetch('/api/sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})});const d=await r.json();if(d.success){toast('Session créée');hideModal();loadSessions()}else toast(d.message||'Erreur','error')}catch{toast('Erreur réseau','error')}}
        async function start(id){try{const r=await fetch('/api/sessions/'+id+'/start',{method:'POST'});const d=await r.json();if(d.success){toast('Démarrée');loadSessions()}else toast(d.message||'Erreur','error')}catch{}}
        async function stop(id){try{const r=await fetch('/api/sessions/'+id+'/stop',{method:'POST'});const d=await r.json();if(d.success){toast('Arrêtée');loadSessions()}else toast(d.message||'Erreur','error')}catch{}}
        async function del(id){if(!confirm('Supprimer?'))return;try{const r=await fetch('/api/sessions/'+id,{method:'DELETE'});const d=await r.json();if(d.success){toast('Supprimée');loadSessions()}else toast(d.message||'Erreur','error')}catch{}}
        async function logout(){await fetch('/api/auth/logout',{method:'POST'});location.href='/auth'}
        checkAuth().then(ok=>{if(ok){loadSessions();loadStats()}});
    </script>
</body>
</html>
