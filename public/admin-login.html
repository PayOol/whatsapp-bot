<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - WhatsApp Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #252540;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border: #2e2e4a;
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }
        
        .admin-login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        
        .admin-login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .admin-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
        }
        
        .admin-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .admin-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 12px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        
        .form-input::placeholder {
            color: var(--text-secondary);
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            width: 100%;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }
        
        .error-message.show {
            display: flex;
        }
        
        .must-change-password {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: var(--warning);
            padding: 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .must-change-password.show {
            display: block;
        }
        
        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        
        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        
        .back-link a:hover {
            color: var(--primary);
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn.loading .btn-text { display: none; }
        .btn.loading .loading-spinner { display: block; }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="admin-header">
                <div class="admin-logo">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1 class="admin-title">Administration</h1>
                <p class="admin-subtitle">Connexion réservée aux administrateurs</p>
                <div class="admin-badge">
                    <i class="fas fa-lock"></i>
                    Accès sécurisé
                </div>
            </div>
            
            <div class="error-message" id="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text"></span>
            </div>
            
            <!-- Login Form -->
            <div id="login-form">
                <div class="form-group">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input type="text" class="form-input" id="username" placeholder="Entrez votre nom d'utilisateur" autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" class="form-input" id="password" placeholder="Entrez votre mot de passe" autocomplete="current-password">
                </div>
                <button type="button" class="btn btn-primary" id="login-btn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Se connecter</span>
                    <div class="loading-spinner"></div>
                </button>
            </div>
            
            <!-- Change Password Form -->
            <div class="must-change-password" id="must-change-info">
                <i class="fas fa-info-circle"></i>
                Pour votre première connexion, vous devez définir un nouveau mot de passe.
            </div>
            
            <form id="change-password-form" style="display:none" onsubmit="handleChangePassword(event)">
                <div class="form-group">
                    <label class="form-label">Nouveau mot de passe</label>
                    <input type="password" class="form-input" id="new-password" placeholder="Min. 6 caractères" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirmer le mot de passe</label>
                    <input type="password" class="form-input" id="new-password-confirm" placeholder="Confirmez le mot de passe" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary" id="change-btn">
                    <span class="btn-text"><i class="fas fa-key"></i> Définir le mot de passe</span>
                    <div class="loading-spinner"></div>
                </button>
            </form>
            
            <div class="back-link">
                <a href="/"><i class="fas fa-arrow-left"></i> Retour au site</a>
            </div>
        </div>
    </div>
    
    <script>
        console.log('Script loaded');
        
        let currentUser = null;
        
        // Add event listener when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM ready');
            
            document.getElementById('login-btn').addEventListener('click', handleLogin);
            
            // Prevent Enter key from submitting
            document.getElementById('password').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleLogin();
                }
            });
        });
        
        function showError(message) {
            const errorEl = document.getElementById('error-message');
            document.getElementById('error-text').textContent = message;
            errorEl.classList.add('show');
        }
        
        function hideError() {
            document.getElementById('error-message').classList.remove('show');
        }
        
        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }
        
        function handleLogin() {
            hideError();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showError('Veuillez remplir tous les champs');
                return;
            }
            
            setLoading('login-btn', true);
            
            fetch('/api/auth/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                console.log('Login response:', data);
                
                if (data.success) {
                    if (!data.isAdmin) {
                        showError('Accès réservé aux administrateurs');
                        setLoading('login-btn', false);
                        return;
                    }
                    
                    currentUser = { username: data.username, isAdmin: data.isAdmin };
                    
                    if (data.mustChangePassword) {
                        document.getElementById('login-form').style.display = 'none';
                        document.getElementById('change-password-form').style.display = 'block';
                        document.getElementById('must-change-info').classList.add('show');
                        setLoading('login-btn', false);
                    } else {
                        console.log('Redirecting to /admin');
                        window.location.href = '/admin';
                    }
                } else {
                    showError(data.message || 'Erreur de connexion');
                    setLoading('login-btn', false);
                }
            })
            .catch(e => {
                console.error('Login error:', e);
                showError('Erreur de connexion au serveur');
                setLoading('login-btn', false);
            });
        }
        
        async function handleChangePassword(e) {
            e.preventDefault();
            hideError();
            
            const newPassword = document.getElementById('new-password').value;
            const newPasswordConfirm = document.getElementById('new-password-confirm').value;
            
            if (!newPassword || !newPasswordConfirm) {
                showError('Veuillez remplir tous les champs');
                return;
            }
            
            if (newPassword.length < 6) {
                showError('Le mot de passe doit contenir au moins 6 caractères');
                return;
            }
            
            if (newPassword !== newPasswordConfirm) {
                showError('Les mots de passe ne correspondent pas');
                return;
            }
            
            setLoading('change-btn', true);
            
            try {
                const res = await fetch('/api/auth/admin/password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ password: newPassword })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    window.location.href = '/admin';
                } else {
                    showError(data.message || 'Erreur lors du changement');
                }
            } catch (e) {
                showError('Erreur de connexion au serveur');
            }
            
            setLoading('change-btn', false);
        }
    </script>
</body>
</html>
